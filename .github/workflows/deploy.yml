name: Deploy to Cloud Run

# Tag-based deploys: push a version tag to ship (clean rollbacks = redeploy an older tag).
on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

# Required repository secrets:
#   GCP_PROJECT_ID        - GCP project id
#   GCP_SA_KEY            - JSON key of a deployer service account
#                           (roles: run.admin, artifactregistry.writer, iam.serviceAccountUser)
# Adjust REGION / SERVICE / AR_REPO to your setup.
env:
  REGION: europe-west1
  SERVICE: planning-poker
  AR_REPO: planning-poker
  IMAGE: europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/planning-poker/planning-poker:${{ github.sha }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build & push image
        run: |
          docker build -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "$SERVICE" \
            --image "$IMAGE" \
            --region "$REGION" \
            --platform managed \
            --allow-unauthenticated \
            --min-instances=0 \
            --max-instances=1 \
            --concurrency=250 \
            --port=8080 \
            --timeout=3600
        # Domain mapping poker.serbito.rs is configured once, out-of-band:
        #   gcloud run domain-mappings create --service planning-poker \
        #     --domain poker.serbito.rs --region europe-west1
