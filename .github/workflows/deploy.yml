name: Deploy to Cloud Run

# Tag-based deploys: push a v*.*.* tag (e.g. via scripts/release_minor.sh) to ship.
# Keyless auth via Workload Identity Federation — no service-account JSON key.
on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write # required for WIF / OIDC

env:
  PROJECT_ID: serbito
  REGION: europe-west1
  SERVICE: planning-poker
  AR_IMAGE: europe-west1-docker.pkg.dev/serbito/planning-poker/planning-poker
  WIF_PROVIDER: projects/488744139718/locations/global/workloadIdentityPools/github-pool/providers/github
  DEPLOYER_SA: pp-deployer@serbito.iam.gserviceaccount.com

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4 (SHA-pinned)

      - id: auth
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2 (SHA-pinned)
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SA }}

      - uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2 (SHA-pinned)

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3 (SHA-pinned)

      - name: Build & push image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6 (SHA-pinned)
        with:
          context: .
          push: true
          tags: ${{ env.AR_IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.AR_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.AR_IMAGE }}:buildcache,mode=max

      # --- Security: scan the built image for OS/dep CVEs + leaked secrets (parity with
      # serbito). Hard gate: a *fixed* HIGH/CRITICAL fails the deploy. Pinned install
      # (tagged install.sh + binary version, not mutable main) for supply-chain safety. ---
      - name: Trivy image scan
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/v0.71.2/contrib/install.sh | sh -s -- -b /usr/local/bin v0.71.2
          trivy image --scanners vuln,secret --severity HIGH,CRITICAL \
            --ignore-unfixed --exit-code 1 --format table --timeout 10m \
            "${{ env.AR_IMAGE }}:${{ github.sha }}"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "$SERVICE" \
            --image "$AR_IMAGE:${{ github.sha }}" \
            --region "$REGION" \
            --platform managed \
            --allow-unauthenticated \
            --min-instances=0 \
            --max-instances=1 \
            --concurrency=250 \
            --port=8080 \
            --timeout=300
        # NB: keep --timeout low (300s, Cloud Run default). A WebSocket is one HTTP
        # request that never returns, so a high timeout (was 3600) lets an abandoned
        # client pin a billable instance up to an hour and blocks scale-to-zero
        # (this caused a ~$2/day Cloud Run cost spike). The client auto-reconnects, so
        # a 5-min cap is safe; it bounds how long a stray socket keeps an instance warm.
        # One-time domain mapping (poker.serbito.rs -> service) is configured out-of-band.
